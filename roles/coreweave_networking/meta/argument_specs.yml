---
argument_specs:
  main:
    short_description: "Configure load balancers and ingress"
    options:
      coreweave_networking_host:
        description: Target host address
        type: str
        required: true
      coreweave_networking_username:
        description: Authentication username
        type: str
      coreweave_networking_password:
        description: Authentication password
        type: str
      coreweave_networking_api_key:
        description: API key for authentication
        type: str
      coreweave_networking_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      coreweave_networking_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
