---
- name: Configure CoreWeave storage
  block:
    - name: Verify required storage classes exist
      kubernetes.core.k8s_info:
        kubeconfig: "{{ gpu_kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "{{ item }}"
      register: _sc_check
      failed_when: _sc_check.resources | length == 0
      loop: "{{ storage_required_classes }}"
      loop_control:
        label: "{{ item }}"

    - name: Create block storage PVCs
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: "{{ storage_state }}"
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ item.name }}"
            namespace: "{{ storage_namespace }}"
          spec:
            accessModes:
              - "{{ item.access_mode | default('ReadWriteOnce') }}"
            storageClassName: "{{ item.storage_class }}"
            resources:
              requests:
                storage: "{{ item.size_gi }}Gi"
      loop: "{{ storage_block_pvcs }}"
      loop_control:
        label: "{{ item.name }} ({{ item.size_gi }}Gi)"
      when: storage_block_pvcs | length > 0

    - name: Create shared filesystem PVCs
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: "{{ storage_state }}"
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ item.name }}"
            namespace: "{{ storage_namespace }}"
          spec:
            accessModes:
              - "{{ item.access_mode | default('ReadWriteMany') }}"
            storageClassName: "{{ item.storage_class }}"
            resources:
              requests:
                storage: "{{ item.size_gi }}Gi"
      loop: "{{ storage_shared_pvcs }}"
      loop_control:
        label: "{{ item.name }} ({{ item.size_gi }}Gi)"
      when: storage_shared_pvcs | length > 0

    - name: Create S3 credential secrets
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: "{{ storage_state }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ item.secret_name }}"
            namespace: "{{ storage_namespace }}"
          type: Opaque
          stringData:
            endpoint: "{{ item.endpoint }}"
            region: "{{ item.region }}"
            bucket: "{{ item.name }}"
      loop: "{{ storage_s3_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      when: storage_s3_buckets | length > 0
      no_log: true

    - name: Wait for PVCs to be bound
      kubernetes.core.k8s_info:
        kubeconfig: "{{ gpu_kubeconfig }}"
        api_version: v1
        kind: PersistentVolumeClaim
        namespace: "{{ storage_namespace }}"
        name: "{{ item.name }}"
      register: _pvc_status
      until:
        - _pvc_status.resources | length > 0
        - _pvc_status.resources[0].status.phase == "Bound"
      retries: 30
      delay: 10
      loop: "{{ storage_block_pvcs + storage_shared_pvcs }}"
      loop_control:
        label: "{{ item.name }}"
      when: (storage_block_pvcs + storage_shared_pvcs) | length > 0

    - name: Run data initialization jobs
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: present
        definition:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: "{{ item.name }}"
            namespace: "{{ storage_namespace }}"
          spec:
            backoffLimit: 3
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: init
                    image: "{{ item.image }}"
                    command: "{{ item.command }}"
                    volumeMounts:
                      - name: data
                        mountPath: "{{ item.mount_path }}"
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: "{{ item.pvc_name }}"
      loop: "{{ storage_init_jobs }}"
      loop_control:
        label: "{{ item.name }}"
      when: storage_init_jobs | length > 0

  rescue:
    - name: Report storage setup failure
      ansible.builtin.fail:
        msg: >-
          Storage setup failed.
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}
