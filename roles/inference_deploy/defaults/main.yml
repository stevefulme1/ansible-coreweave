---
# Required
# inference_name: ""
# inference_model_image: ""  # Container image with model

inference_namespace: "default"
inference_state: present

# Model server
inference_runtime: "triton"  # triton, vllm, tgi, custom
inference_gpu_type: "A100_PCIE_80GB"
inference_gpu_count: 1
inference_cpu_count: 4
inference_memory_gi: 16

# Scaling
inference_min_replicas: 1
inference_max_replicas: 5
inference_target_concurrency: 10
inference_scale_down_delay: "5m"

# Service
inference_port: 8080
inference_protocol: "http"
inference_health_path: "/health"
inference_readiness_path: "/ready"

# Model storage
inference_model_pvc: ""
inference_model_mount_path: "/models"

# Environment
inference_env_vars: {}
inference_args: []

# Region
inference_region: "ORD1"

# Labels
inference_labels: {}

# Kubernetes API
gpu_kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
