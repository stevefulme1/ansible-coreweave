---
# tasks/main.yml for coreweave_storage_setup
# Provision and configure persistent storage

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - coreweave_storage_setup_host is defined
    fail_msg: "coreweave_storage_setup_host must be defined"
    quiet: true

- name: Execute coreweave storage setup
  ansible.builtin.debug:
    msg: >-
      Provision and configure persistent storage.
      Target: {{ coreweave_storage_setup_host }}
