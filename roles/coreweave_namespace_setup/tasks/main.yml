---
# tasks/main.yml for coreweave_namespace_setup
# Configure namespace with quotas and policies

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - coreweave_namespace_setup_host is defined
    fail_msg: "coreweave_namespace_setup_host must be defined"
    quiet: true

- name: Execute coreweave namespace setup
  ansible.builtin.debug:
    msg: >-
      Configure namespace with quotas and policies.
      Target: {{ coreweave_namespace_setup_host }}
