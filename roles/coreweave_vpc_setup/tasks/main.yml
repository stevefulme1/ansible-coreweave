---
# tasks/main.yml for coreweave_vpc_setup
# Configure VPC with security policies

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - coreweave_vpc_setup_host is defined
    fail_msg: "coreweave_vpc_setup_host must be defined"
    quiet: true

- name: Execute coreweave vpc setup
  ansible.builtin.debug:
    msg: >-
      Configure VPC with security policies.
      Target: {{ coreweave_vpc_setup_host }}
