---
argument_specs:
  main:
    short_description: "Provision GPU instances with storage"
    options:
      coreweave_gpu_provision_host:
        description: Target host address
        type: str
        required: true
      coreweave_gpu_provision_username:
        description: Authentication username
        type: str
      coreweave_gpu_provision_password:
        description: Authentication password
        type: str
        no_log: true
      coreweave_gpu_provision_api_key:
        description: API key for authentication
        type: str
        no_log: true
      coreweave_gpu_provision_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      coreweave_gpu_provision_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
