---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - gpu_cluster_name is defined and gpu_cluster_name | length > 0
      - gpu_type is defined and gpu_type | length > 0
    fail_msg: "Required variables: gpu_cluster_name, gpu_type"

- name: Provision GPU cluster
  block:
    - name: Create namespace if needed
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ gpu_namespace }}"
      when: gpu_namespace != "default"

    - name: Create GPU VirtualServer instances
      kubernetes.core.k8s:
        kubeconfig: "{{ gpu_kubeconfig }}"
        state: "{{ gpu_state }}"
        definition:
          apiVersion: virtualservers.coreweave.com/v1alpha1
          kind: VirtualServer
          metadata:
            name: "{{ gpu_cluster_name }}-{{ idx }}"
            namespace: "{{ gpu_namespace }}"
            labels: "{{ gpu_labels | combine({'cluster': gpu_cluster_name, 'gpu-type': gpu_type}) }}"
            annotations: "{{ gpu_annotations }}"
          spec:
            region: "{{ gpu_region }}"
            os:
              type: linux
            resources:
              gpu:
                type: "{{ gpu_type }}"
                count: "{{ gpu_count }}"
              cpu:
                count: "{{ gpu_cpu_count }}"
              memory: "{{ gpu_memory_gi }}Gi"
            storage:
              root:
                size: "{{ gpu_root_disk_size_gi }}Gi"
                storageClassName: "{{ gpu_root_disk_storage_class }}"
                source:
                  pvc:
                    namespace: "{{ gpu_namespace }}"
                    name: "{{ gpu_os_image }}"
            network:
              public: "{{ gpu_public_ip }}"
              directAttachLoadBalancerIP: "{{ gpu_network_type == 'direct' }}"
            users:
              - username: user
                sshpublickey: "{{ gpu_ssh_key | default(omit) }}"
            cloudInit: "{{ gpu_user_data | default(omit) }}"
            initializeRunning: true
      loop: "{{ range(gpu_node_count) | list }}"
      loop_control:
        index_var: idx
        label: "{{ gpu_cluster_name }}-{{ idx }}"
      register: _gpu_vms

    - name: Wait for VirtualServers to become ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ gpu_kubeconfig }}"
        api_version: virtualservers.coreweave.com/v1alpha1
        kind: VirtualServer
        namespace: "{{ gpu_namespace }}"
        name: "{{ gpu_cluster_name }}-{{ idx }}"
      register: _gpu_status
      until:
        - _gpu_status.resources | length > 0
        - _gpu_status.resources[0].status.ready | default(false)
      retries: 60
      delay: 10
      loop: "{{ range(gpu_node_count) | list }}"
      loop_control:
        index_var: idx
        label: "{{ gpu_cluster_name }}-{{ idx }}"

    - name: Display cluster details
      ansible.builtin.debug:
        msg: >-
          GPU cluster '{{ gpu_cluster_name }}' with {{ gpu_node_count }} x {{ gpu_type }}
          nodes provisioned in {{ gpu_region }}

  rescue:
    - name: Report GPU cluster provisioning failure
      ansible.builtin.fail:
        msg: >-
          GPU cluster provisioning failed for '{{ gpu_cluster_name }}'.
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}
