---
argument_specs:
  main:
    short_description: "Right-size GPU instances and spot scheduling"
    options:
      coreweave_cost_optimization_host:
        description: Target host address
        type: str
        required: true
      coreweave_cost_optimization_username:
        description: Authentication username
        type: str
      coreweave_cost_optimization_password:
        description: Authentication password
        type: str
      coreweave_cost_optimization_api_key:
        description: API key for authentication
        type: str
      coreweave_cost_optimization_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      coreweave_cost_optimization_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
