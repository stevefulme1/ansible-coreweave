---
# tasks/main.yml for coreweave_cost_optimization
# Right-size GPU instances and spot scheduling

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - coreweave_cost_optimization_host is defined
    fail_msg: "coreweave_cost_optimization_host must be defined"
    quiet: true

- name: Execute coreweave cost optimization
  ansible.builtin.debug:
    msg: >-
      Right-size GPU instances and spot scheduling.
      Target: {{ coreweave_cost_optimization_host }}
