---
# tasks/main.yml for coreweave_teardown
# Graceful workload and resource teardown

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - coreweave_teardown_host is defined
    fail_msg: "coreweave_teardown_host must be defined"
    quiet: true

- name: Execute coreweave teardown
  ansible.builtin.debug:
    msg: >-
      Graceful workload and resource teardown.
      Target: {{ coreweave_teardown_host }}
