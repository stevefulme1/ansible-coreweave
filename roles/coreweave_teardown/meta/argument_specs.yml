---
argument_specs:
  main:
    short_description: "Graceful workload and resource teardown"
    options:
      coreweave_teardown_host:
        description: Target host address
        type: str
        required: true
      coreweave_teardown_username:
        description: Authentication username
        type: str
      coreweave_teardown_password:
        description: Authentication password
        type: str
      coreweave_teardown_api_key:
        description: API key for authentication
        type: str
      coreweave_teardown_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      coreweave_teardown_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
