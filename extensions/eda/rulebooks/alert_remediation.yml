---
- name: "Coreweave Alert Remediation"
  hosts: all
  sources:
    - stevefulme1.coreweave.gpu_availability:
        host: 127.0.0.1
        port: 5000

  rules:
    - name: Critical alert - auto-remediate
      condition: >-
        event.coreweave.severity is defined and
        event.coreweave.severity == "critical"
      action:
        run_playbook:
          name: remediate.yml
          extra_vars:
            alert_host: "{{ event.coreweave.host | default('') }}"
            alert_id: "{{ event.coreweave.id | default('') }}"
            severity: "{{ event.coreweave.severity }}"

    - name: Warning alert - notify
      condition: >-
        event.coreweave.severity is defined and
        event.coreweave.severity == "warning"
      action:
        print_event:
          pretty: true
